name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: pub get
        run: flutter pub get

      - name: Analyze
        # Infos (z. B. avoid_print, Legacy-Enum-Namen in oeffentlicher API) sind
        # nicht release-blockierend; Errors und Warnings schon.
        run: flutter analyze --no-fatal-infos

      - name: Tests
        run: flutter test
