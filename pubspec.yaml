name: kasseneck_api
description: "A Flutter package for interacting with the Kasseneck Cashregister API. By Kreiseck."
version: 4.0.0
homepage: https://github.com/mhmmdlkts/kasseneck_flutter_api
repository: https://github.com/mhmmdlkts/kasseneck_flutter_api
issue_tracker: https://github.com/mhmmdlkts/kasseneck_flutter_api/issues

environment:
  sdk: ^3.6.0
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  path_provider: ^2.1.5
  qr_flutter: ^4.1.0
  flutter_blue_plus: ^2.3.4
  sumup: ^0.13.1 # 0.14.x zieht den gated Tap-to-Pay-SDK (privates Maven-Repo, Credentials nötig) – wird nicht genutzt
    #path: ../sumup_flutter_plugin
  my_pos: ^0.3.0
    #path: ../mypos_flutter_package/my_pos/my_pos

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/kreiseck_logo_print.png